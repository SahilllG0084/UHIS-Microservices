spring.application.name=UHIS-API-GATEWAY
server.port=8765

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.routes[0].id=caseworker-route
spring.cloud.gateway.routes[0].uri=lb://UHIS-CASEWORKER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/cw-service/module/**

spring.cloud.gateway.routes[1].id=admin-route
spring.cloud.gateway.routes[1].uri=lb://UHIS-ADMIN-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/admin/module/**

spring.cloud.gateway.routes[2].id=ar-route
spring.cloud.gateway.routes[2].uri=lb://UHIS-APPLICATION-RGISTRATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/ar/module/**

spring.cloud.gateway.routes[3].id=dc-route
spring.cloud.gateway.routes[3].uri=lb://UHIS-DATACOLLECTION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/dc/module/**

spring.cloud.gateway.routes[4].id=ed-route
spring.cloud.gateway.routes[4].uri=lb://UHIS-ED-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/ed/module/**

spring.cloud.gateway.routes[5].id=correspondence-route
spring.cloud.gateway.routes[5].uri=lb://UHIS-CORRESPONDENCE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/crd/module/**

spring.cloud.gateway.routes[6].id=ssa-route
spring.cloud.gateway.routes[6].uri=lb://UHIS-SSA-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/**